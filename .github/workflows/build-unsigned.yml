# Сборка VexGram.ipa с подписью Xcode (managed).
# Не требует папки fake-codesigning — можно запустить сразу после пуша в GitHub.
# Для подписанного релиза используйте workflow "CI" и добавьте build-system/fake-codesigning.
name: Build VexGram (Xcode managed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Patch rules_apple to allow build without provisioning profile (CI)
        run: |
          # 1) provisioning_profile.bzl: allow no profile (return empty struct)
          P1="build-system/bazel-rules/rules_apple/apple/internal/partials/provisioning_profile.bzl"
          python3 << PYEOF
          path = "$P1"
          with open(path) as f:
            s = f.read()
          if "return struct(bundle_files = [])" in s:
            print("provisioning_profile.bzl: already patched")
          else:
            beg = s.find("if not profile_artifact:")
            if beg == -1:
              raise SystemExit("Pattern 'if not profile_artifact:' not found in " + path)
            line_start = s.rfind("\n", 0, beg) + 1
            indent = s[line_start:beg]
            end = s.find("# Create intermediate", beg)
            if end == -1:
              raise SystemExit("Pattern '# Create intermediate' not found")
            s2 = s[:line_start] + indent + "if not profile_artifact:\n" + indent + "    return struct(bundle_files = [])\n\n    " + s[end:]
            with open(path, "w") as f:
              f.write(s2)
            print("Patched " + path)
          PYEOF
          # 2) codesigning_support.bzl: skip validation when no profile (device build without profile)
          P2="build-system/bazel-rules/rules_apple/apple/internal/codesigning_support.bzl"
          python3 << PYEOF
          path = "$P2"
          with open(path) as f:
            s = f.read()
          if "CI: allow device build without profile" in s:
            print("codesigning_support.bzl: already patched")
          else:
            beg = s.find("The provisioning_profile attribute must be set for device")
            if beg == -1:
              raise SystemExit("Pattern not found in " + path)
            fail_start = s.rfind("fail(", 0, beg)
            if fail_start == -1:
              raise SystemExit("fail( not found before marker")
            line_start = s.rfind("\n", 0, fail_start) + 1
            indent = s[line_start:fail_start]
            end = s.find("platform_prerequisites.platform_type)", beg) + len("platform_prerequisites.platform_type)")
            repl = indent + "pass  # CI: allow device build without profile\n"
            s2 = s[:line_start] + repl + s[end:]
            with open(path, "w") as f:
              f.write(s2)
            print("Patched " + path)
          PYEOF

      - name: Set active Xcode path
        run: |
          if [ -d /Applications/Xcode_15.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
          else
            echo "Using default Xcode"
            xcode-select -p
          fi
          xcodebuild -version

      - name: Create canonical source directory
        run: |
          set -x
          sudo mkdir -p /Users/Shared
          cp -R $GITHUB_WORKSPACE /Users/Shared/
          mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

      - name: Use Bazel 7.1.1 via Bazelisk (project requires Bazel 7, not 9)
        run: |
          export USE_BAZEL_VERSION=7.1.1
          echo "USE_BAZEL_VERSION=7.1.1" >> $GITHUB_ENV
          which bazel
          bazel --version

      - name: Restore Bazel cache
        uses: actions/cache/restore@v4
        id: bazel-cache-restore
        with:
          path: /private/var/tmp/_bazel_containerhost
          key: macos-bazel-7.1.1-${{ hashFiles('MODULE.bazel.lock', 'WORKSPACE', 'versions.json', 'Telegram/BUILD') }}
          restore-keys: |
            macos-bazel-7.1.1-

      - name: Build the App
        run: |
          set -e
          set -x
          SOURCE_DIR=/Users/Shared/telegram-ios
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"
          cd $SOURCE_DIR

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"
          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

          python3 -u build-system/Make/Make.py \
            --bazel="$(which bazel)" \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            --overrideXcodeVersion \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --xcodeManagedCodesigning \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER"

      - name: Collect IPA
        run: |
          set -e
          SOURCE_DIR=/Users/Shared/telegram-ios
          cd $SOURCE_DIR
          OUTPUT_PATH="build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"
          IPA=$(find bazel-out -name "VexGram.ipa" -type f 2>/dev/null | head -1)
          if [ -n "$IPA" ]; then
            cp "$IPA" "$OUTPUT_PATH/VexGram.ipa"
            echo "Copied IPA from: $IPA"
          else
            echo "VexGram.ipa not found. Listing bazel-out:"
            ls -la bazel-out/ 2>/dev/null || true
            find bazel-out -name "*.ipa" 2>/dev/null || true
            exit 1
          fi

      - name: Save Bazel cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: /private/var/tmp/_bazel_containerhost
          key: macos-bazel-7.1.1-${{ hashFiles('MODULE.bazel.lock', 'WORKSPACE', 'versions.json', 'Telegram/BUILD') }}

      - name: Upload VexGram.ipa
        uses: actions/upload-artifact@v4
        with:
          name: VexGram-ipa
          path: /Users/Shared/telegram-ios/build/artifacts/VexGram.ipa
